# COMO USAR:
#   1. docker-compose up -d
#   2. docker-compose logs -f
#   3. docker-compose down
#   4. docker-compose build api

name: ssmup-back

services:

  postgres:
    image: postgres:15-alpine
    container_name: ssmup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssmup
      POSTGRES_USER: ssmup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssmup -d ssmup"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssmup-network

  redis:
    image: redis:7-alpine
    container_name: ssmup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssmup-network

  solr:
    image: solr
    container_name: ssmup-solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    command:
      - solr-precreate
      - empresas
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8983/solr/empresas/admin/ping" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ssmup-network
  # ========================================
  # Spring Boot API
  # ========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssmup-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ssmup
      SPRING_DATASOURCE_USERNAME: ssmup
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

      SOLR_URL: http://solr:8983/solr

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5000}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      solr:
        condition: service_healthy
    networks:
      - ssmup-network
volumes:
  postgres_data:
  solr_data:
  redis_data:

networks:
  ssmup-network:
    driver: bridge